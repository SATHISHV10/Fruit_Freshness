<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fruit Freshness Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🍎 Fruit Freshness Detection 🍌</h1>

        <p>
            Upload a fruit image and click the button below to check whether
            the fruit is <b>Fresh</b> or <b>Rotten</b>.
        </p>

        <form action="/" method="POST" enctype="multipart/form-data">

            <input
                type="file"
                name="image"
                accept="image/*"
                required>

            <br><br>

            <button type="submit">
                🔍 Predict Freshness
            </button>

        </form>

        {% if result %}

        <div class="result">

            <h2>{{ result }}</h2>

            {% if image %}
            <img src="{{ url_for('static', filename='uploads/' + image) }}">
            {% endif %}

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
